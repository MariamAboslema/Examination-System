<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamPro — Results</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="result.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="glow" id="bgGlow"></div>
<div class="card">
  <span class="logo">Exam<span>Pro</span></span>
  <div id="timeoutBanner">⏰ Time's Up!</div>
  <span class="result-icon" id="resultIcon"></span>
  <div class="result-badge" id="resultBadge"></div>
  <h1 id="resultTitle"></h1>
  <p class="subtitle" id="resultSubtitle"></p>
  <div class="score-ring-container">
    <svg viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="58" fill="none" stroke="#1f2d45" stroke-width="10"/>
      <circle cx="70" cy="70" r="58" fill="none" stroke="url(#scoreGrad)" stroke-width="10"
        stroke-linecap="round" id="scoreCircle"
        style="stroke-dasharray:364.4; stroke-dashoffset:364.4;"/>
      <defs>
        <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#10b981"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="score-ring-text">
      <span class="score-num" id="scoreNum"></span>
      <span class="score-label">Score</span>
    </div>
  </div>
  <div class="stats-row" id="statsRow"></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="logout()">Logout</button>
  </div>
</div>
<script src="result.js"></script>
</body>
</html>
